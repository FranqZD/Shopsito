# ===================================================================
# ShopBuilder - Development Profile Configuration
# ===================================================================

# ===================================================================
# H2 In-Memory Database
# ===================================================================
spring.datasource.url=jdbc:h2:mem:shopbuilder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# JPA / Hibernate - Dev
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Flyway - Disabled for dev (using Hibernate ddl-auto instead)
# ===================================================================
spring.flyway.enabled=false

# ===================================================================
# JWT - Dev (24 hours expiration)
# ===================================================================
app.jwt.expiration-ms=86400000

# ===================================================================
# CORS - Dev (Vite default port)
# ===================================================================
app.cors.allowed-origin=http://localhost:5173

# ===================================================================
# Storage - Dev (local filesystem)
# ===================================================================
app.storage.provider=local
app.storage.upload-dir=uploads
app.storage.base-url=http://localhost:8080

# ===================================================================
# Logging - Dev
# ===================================================================
logging.level.com.shopbuilder=DEBUG
logging.level.org.springframework.security=DEBUG
