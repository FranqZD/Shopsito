# ===================================================================
# ShopBuilder - Common Configuration
# ===================================================================
spring.application.name=shopbuilder

# Active profile (default to dev for local development)
spring.profiles.active=dev

# ===================================================================
# JWT Configuration
# ===================================================================
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIGRldmVsb3BtZW50IHNlY3JldCBrZXkgdGhhdCBzaG91bGQgYmUgcmVwbGFjZWQgaW4gcHJvZHVjdGlvbg==}
app.jwt.expiration-ms=86400000

# ===================================================================
# CORS Configuration
# ===================================================================
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ===================================================================
# Storage Configuration
# ===================================================================
app.storage.upload-dir=uploads
app.storage.base-url=http://localhost:8080
app.storage.provider=${STORAGE_PROVIDER:local}

# ===================================================================
# Server Configuration
# ===================================================================
server.port=8080

# ===================================================================
# Jackson Configuration
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
