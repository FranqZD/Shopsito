# ===================================================================
# ShopBuilder - Test Profile Configuration
# ===================================================================

# H2 In-Memory Database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate - Test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway - Disabled for tests
spring.flyway.enabled=false

# JWT - Test
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1zaG9wYnVpbGRlci1hcHBsaWNhdGlvbi10ZXN0cw==
app.jwt.expiration-ms=86400000

# CORS - Test
app.cors.allowed-origin=http://localhost:5173

# Storage - Test
app.storage.provider=local
app.storage.upload-dir=test-uploads
app.storage.base-url=http://localhost:8080
